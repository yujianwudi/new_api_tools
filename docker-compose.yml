# NewAPI Middleware Tool - Docker Compose Configuration
#
# 使用方式:
#   1. 通过 install.sh 一键安装 (推荐)
#   2. 通过 deploy.sh 自动部署: ./deploy.sh
#   3. 手动部署: 在 .env 中设置不可变 repo@sha256 digest 后运行 docker compose up -d
#
# 更新方式:
#   docker compose pull && docker compose down && docker compose up -d

services:
  newapi-tools:
    image: "${NEWAPI_TOOLS_IMAGE:?NEWAPI_TOOLS_IMAGE must be an immutable repo@sha256 digest; use install/deploy to resolve tags safely}"
    container_name: newapi-tools
    ports:
      # FRONTEND_BIND 控制端口绑定的网卡：
      #   - 127.0.0.1（默认）：仅本机，需要在宿主机配 HTTPS 反向代理
      #   - 0.0.0.0          ：显式公网暴露；必须置于 HTTPS 反向代理和访问控制之后
      - "${FRONTEND_BIND:-127.0.0.1}:${FRONTEND_PORT:-1145}:8080"
    environment:
      # 数据库配置 (Go 版本统一使用 SQL_DSN)
      - SQL_DSN=${SQL_DSN:-}
      # 日志专用库（可选）：NewAPI 若用 LOG_SQL_DSN 把 logs 表分离到独立库，
      # 本工具需读取该库才能看到实时日志/流量。为空时日志查询回落到主库。
      - LOG_SQL_DSN=${LOG_SQL_DSN:-}
      # 兼容旧版本分离配置
      - DB_ENGINE=${DB_ENGINE:-}
      - DB_DNS=${DB_DNS:-}
      - DB_PORT=${DB_PORT:-}
      - DB_NAME=${DB_NAME:-}
      - DB_USER=${DB_USER:-}
      - DB_PASSWORD=${DB_PASSWORD:-}
      # 连接池（可选）
      - DB_MAX_OPEN_CONNS=${DB_MAX_OPEN_CONNS:-}
      - DB_MAX_IDLE_CONNS=${DB_MAX_IDLE_CONNS:-}
      # 认证
      - API_KEY=${API_KEY}
      - API_KEY_ROLE=${API_KEY_ROLE:-viewer}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - JWT_SECRET_KEY=${JWT_SECRET}
      - JWT_EXPIRE_HOURS=${JWT_EXPIRE_HOURS:-24}
      # 浏览器跨域（默认关闭，仅允许同源访问）
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-}
      - CORS_ALLOW_CREDENTIALS=${CORS_ALLOW_CREDENTIALS:-false}
      # 登录防暴力破解
      - LOGIN_MAX_ATTEMPTS=${LOGIN_MAX_ATTEMPTS:-8}
      - LOGIN_ATTEMPT_WINDOW_SECONDS=${LOGIN_ATTEMPT_WINDOW_SECONDS:-900}
      - LOGIN_BACKOFF_BASE_MS=${LOGIN_BACKOFF_BASE_MS:-500}
      - LOGIN_BACKOFF_MAX_SECONDS=${LOGIN_BACKOFF_MAX_SECONDS:-30}
      # 公开模型状态接口资源限制
      - PUBLIC_MODEL_MAX_BATCH=${PUBLIC_MODEL_MAX_BATCH:-50}
      - PUBLIC_MODEL_MAX_BODY_BYTES=${PUBLIC_MODEL_MAX_BODY_BYTES:-16384}
      - PUBLIC_MODEL_REQUESTS_PER_MINUTE=${PUBLIC_MODEL_REQUESTS_PER_MINUTE:-30}
      # 兑换码财务硬上限（NewAPI quota 单位，500000 = US$1）
      - REDEMPTION_MAX_QUOTA_PER_CODE=${REDEMPTION_MAX_QUOTA_PER_CODE:-50000000}
      - REDEMPTION_MAX_TOTAL_QUOTA=${REDEMPTION_MAX_TOTAL_QUOTA:-500000000}
      # 仅信任精确代理地址；外层反代需追加内层 Nginx 实际看到的来源 IP
      - TRUSTED_PROXY_CIDRS=${TRUSTED_PROXY_CIDRS:-127.0.0.1/32,::1/128}
      # Redis 缓存
      - REDIS_CONN_STRING=redis://:${REDIS_PASSWORD:-}@redis:6379/0
      # 服务配置
      # SERVER_HOST 默认 127.0.0.1（仅供容器内 Nginx 反代访问，对外端口由 Nginx 暴露）
      # 如需让其他容器/宿主机直连 Go 后端 8000，可在 .env 中改为 0.0.0.0（不推荐，安全风险）
      - SERVER_HOST=${SERVER_HOST:-127.0.0.1}
      - SERVER_PORT=8000
      - TIMEZONE=${TIMEZONE:-Asia/Shanghai}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      # NewAPI 连接
      - NEWAPI_BASEURL=${NEWAPI_BASEURL:-}
      - NEWAPI_ADMIN_ACCESS_TOKEN=${NEWAPI_ADMIN_ACCESS_TOKEN:-}
      - NEWAPI_ADMIN_USER_ID=${NEWAPI_ADMIN_USER_ID:-0}
      - OBSERVABILITY_TOKEN=${OBSERVABILITY_TOKEN:-}
      - LOG_FRESHNESS_MAX_SECONDS=${LOG_FRESHNESS_MAX_SECONDS:-900}
      - TOOL_STORE_PATH=${TOOL_STORE_PATH:-/app/data/control-plane.db}
      - GEOIP_AUTO_DOWNLOAD=${GEOIP_AUTO_DOWNLOAD:-false}
      - GEOIP_AUTO_UPDATE=${GEOIP_AUTO_UPDATE:-false}
      # NewAPI Redis/直接写库安全边界（工具自身 Redis 与此无关）
      - NEWAPI_REDIS_DISABLED=${NEWAPI_REDIS_DISABLED:-false}
      - ALLOW_UNSAFE_BATCH_DELETE=${ALLOW_UNSAFE_BATCH_DELETE:-false}
      - ALLOW_UNSAFE_HARD_DELETE=${ALLOW_UNSAFE_HARD_DELETE:-false}
      # v0.2 rollback compatibility; newer images ignore this legacy switch.
      - ENFORCE_IP_RECORDING=${ENFORCE_IP_RECORDING:-false}
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    # 用于 NewAPI 以 network_mode: host 部署的场景：DSN 中的 127.0.0.1
    # 会被 deploy.sh 改写为 host.docker.internal，靠这条解析到宿主机网关。
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      image-policy:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"
    healthcheck:
      # v0.5 readiness is authoritative and must include the main DB and Tool
      # Store. A legacy v0.2 image serves SPA HTML for /readyz, so only that
      # non-JSON case may fall back to the semantic DB compatibility endpoint.
      test:
        - CMD-SHELL
        - >-
          ready="$$(curl --silent --show-error http://localhost:8080/readyz 2>/dev/null || true)";
          if printf '%s' "$$ready" | grep -Eq '^[[:space:]]*\{' &&
             printf '%s' "$$ready" | grep -Eq '"status"[[:space:]]*:[[:space:]]*"ready"' &&
             printf '%s' "$$ready" | grep -Eq '"main_database"[[:space:]]*:[[:space:]]*"ok"' &&
             printf '%s' "$$ready" | grep -Eq '"tool_store"[[:space:]]*:[[:space:]]*"ok"'; then exit 0; fi;
          printf '%s' "$$ready" | grep -Eq '^[[:space:]]*\{' && exit 1;
          legacy="$$(curl --fail --silent --show-error http://localhost:8080/api/health/db 2>/dev/null || true)";
          printf '%s' "$$legacy" | grep -Eq '^[[:space:]]*\{' &&
          printf '%s' "$$legacy" | grep -Eq '"success"[[:space:]]*:[[:space:]]*true' &&
          printf '%s' "$$legacy" | grep -Eq '"status"[[:space:]]*:[[:space:]]*"connected"'
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - default
      - newapi-network

  # Manual Compose deployments fail closed unless the application image is an
  # exact lowercase SHA-256 digest. install.sh/deploy.sh may pull a tag first,
  # but they resolve and persist its RepoDigest before invoking `compose up`.
  image-policy:
    image: alpine:3.23.5@sha256:fd791d74b68913cbb027c6546007b3f0d3bc45125f797758156952bc2d6daf40
    environment:
      - NEWAPI_TOOLS_IMAGE=${NEWAPI_TOOLS_IMAGE:?NEWAPI_TOOLS_IMAGE must be an immutable repo@sha256 digest; use install/deploy to resolve tags safely}
    command:
      - /bin/sh
      - -ec
      - |
        printf '%s\n' "$$NEWAPI_TOOLS_IMAGE" |
          grep -Eq '^[^@[:space:]]+@sha256:[0-9a-f]{64}$$' || {
            echo 'NEWAPI_TOOLS_IMAGE must use repo@sha256:<64 lowercase hex>; refusing mutable manual deployment' >&2
            exit 1
          }
    network_mode: none
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    restart: "no"

  # Redis 缓存服务
  redis:
    image: redis:7-alpine@sha256:6ab0b6e7381779332f97b8ca76193e45b0756f38d4c0dcda72dbb3c32061ab99
    container_name: newapi-tools-redis
    # 只允许淘汰带 TTL 的普通缓存/一次性快照；AutoGroup 审计键无 TTL，必须保留。
    command: >
      redis-server
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy volatile-lru
      ${REDIS_PASSWORD:+--requirepass ${REDIS_PASSWORD}}
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - default
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ${REDIS_PASSWORD:+-a ${REDIS_PASSWORD}} ping | grep -q PONG"]
      interval: 5s
      timeout: 3s
      retries: 3
      start_period: 2s

networks:
  default:
  newapi-network:
    external: true
    name: ${NEWAPI_NETWORK:-new-api_default}

volumes:
  redis_data:
